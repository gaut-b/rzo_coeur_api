{% load static %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Réinitialisation du mot de passe | Les Réseaux du Coeur</title>
    <link rel="stylesheet" href="{% static 'admin/css/login.css' %}" />
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}" />
    <link rel="stylesheet" href="{% static 'admin/css/responsive.css' %}" />
  </head>
  <body class="login">
    <div id="container">
      <div id="header">
        <div id="branding">
          <h1 id="site-name">Les Réseaux du Coeur</h1>
        </div>
      </div>

      <div id="content">
        <div id="content-main">
          <h2>Mot de passe oublié ?</h2>
          <p>
            Entrez votre adresse email. Vous recevrez un lien pour créer un
            nouveau mot de passe.
          </p>

          <form method="post" id="password-reset-form">
            {% csrf_token %}
            <div class="form-row">
              <label for="id_email" class="required">Adresse email :</label>
              <input
                type="email"
                name="email"
                id="id_email"
                required
                autofocus
              />
            </div>

            <div class="submit-row">
              <input
                type="submit"
                value="Envoyer le lien de réinitialisation"
              />
            </div>
          </form>

          <p style="margin-top: 1em; text-align: center">
            <a href="javascript:history.back()">← Retour à la connexion</a>
          </p>
        </div>
      </div>

      <div id="footer"></div>
    </div>
  </body>
</html>
