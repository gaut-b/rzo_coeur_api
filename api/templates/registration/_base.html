<html lang="fr">

    <title>{% block title %}Le réSOS du coeur{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'api/css/auth.css' %}" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img src="{% static 'logo.png' %}" alt="Le réSOS du coeur" />

      <div class="footer">Le réSOS du coeur</div>
    </div>
  </body>
</html>
