{% load static i18n %}
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{% endblock %}</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background: #ffffff;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .header {
        background-color: #055e21;
        color: #ffffff;
        padding: 24px 32px;
        text-align: center;
      }
      .header img {
        max-height: 60px;
        display: block;
        margin: 0 auto;
      }
      .body {
        padding: 32px;
        color: #333333;
        line-height: 1.6;
      }
      .body h2 {
        color: #055e21;
        margin-top: 0;
      }
      .btn {
        display: inline-block;
        margin: 20px 0;
        padding: 12px 28px;
        background-color: #055e21;
        color: #ffffff !important;
        text-decoration: none;
        border-radius: 4px;
        font-weight: bold;
      }
      .notice {
        background-color: rgba(242, 225, 20, 0.15);
        border-left: 4px solid #f2e114;
        padding: 12px 16px;
        margin: 16px 0;
        border-radius: 2px;
        font-size: 14px;
      }
      .footer {
        background-color: #f4f4f4;
        padding: 16px 32px;
        font-size: 13px;
        color: #888888;
        text-align: center;
      }
    </style>
    {% block extra_styles %}{% endblock %}
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img
          src="{% if logo_url %}{{ logo_url }}{% else %}{{ request.scheme }}://{{ request.get_host }}{% get_static_prefix %}logo.png{% endif %}"
          alt="Le réSOS du coeur"
        />
      </div>

      <div class="body">
        {% block content %}{% endblock %}
      </div>

      <div class="footer">
        {% block footer %}
          Le réSOS du coeur
        {% endblock %}
      </div>
    </div>
  </body>
</html>
