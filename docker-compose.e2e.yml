# Full-stack e2e test environment.
# Builds and runs the complete stack locally: nginx + backend (gunicorn) + db + minio.
# Started automatically by e2e/conftest.py, torn down (with --volumes) at the end.
#
# Usage (manual):
#   docker compose -f docker-compose.e2e.yml up -d --build --wait
#   docker compose -f docker-compose.e2e.yml exec backend python manage.py seed_data --env e2e
#   docker compose -f docker-compose.e2e.yml down -v

name: rzo-coeur-e2e

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8001:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/src/staticfiles:ro
      - media_files:/app/src/media:ro
    depends_on:
      backend:
        condition: service_healthy

  backend:
    image: rzo-coeur-e2e-backend:latest
    build:
      context: .
    env_file:
      - path: ./.env
        required: false
    environment:
      - SQL_HOST=db-e2e
      - SQL_DATABASE=rzo_coeur_e2e
      - SQL_USER=e2e_user
      - SQL_PASSWORD=e2e_password
      - SQL_PORT=5432
      - DATABASE=postgres
      - DEBUG=1
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CSRF_TRUSTED_ORIGINS=http://localhost:8001,http://127.0.0.1:8001
      - MINIO_ENDPOINT_URL=http://minio:9000
      # Let the container auto-discover system GDAL/GEOS libraries.
      - GDAL_LIBRARY_PATH=
      - GEOS_LIBRARY_PATH=
      # Email — use Mailhog in the e2e stack so emails can be inspected via
      # the Mailhog HTTP API (http://localhost:8025/api/v2/messages).
      - EMAIL_HOST=mailhog
      - EMAIL_PORT=1025
      # Explicit opt-in required by reset_e2e_data to prevent accidental
      # use of that command outside of the E2E test environment.
      - E2E_RESET_CONFIRM=1
    volumes:
      - static_files:/app/src/staticfiles
      - media_files:/app/src/media
    depends_on:
      db-e2e:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import socket; socket.create_connection(("localhost", 8000), timeout=3).close()',
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  db-e2e:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: rzo_coeur_e2e
      POSTGRES_USER: e2e_user
      POSTGRES_PASSWORD: e2e_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U e2e_user -d rzo_coeur_e2e']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    profiles: [init]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/articles-photos;
        mc anonymous set download local/articles-photos;
        echo 'MinIO bucket ready.';
      "

  mailhog:
    image: mailhog/mailhog:latest
    # Port 1025 is the SMTP server used by the backend container.
    # Port 8025 is the Web UI / HTTP API, exposed on the host so Playwright
    # tests can query received emails via http://localhost:8025/api/v2/messages.
    ports:
      - '8025:8025'
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://localhost:8025/ > /dev/null']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  static_files:
  media_files:
  minio_data:
