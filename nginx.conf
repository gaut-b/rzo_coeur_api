upstream django {
    server backend:8000;
}

upstream minio {
    server minio:9000;
}

server {
    listen 80;

    # Django API and admin
    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Allow large file uploads (article photos)
        client_max_body_size 10M;
    }

    # MinIO object storage — publicly served under /storage/
    # e.g. http://localhost/storage/articles-photos/articles/<uuid>.jpg
    location /storage/ {
        proxy_pass         http://minio/;
        proxy_set_header   Host              minio:9000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Do not rewrite redirects from MinIO
        proxy_redirect     off;
    }
}
