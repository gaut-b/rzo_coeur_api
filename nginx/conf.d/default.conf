upstream backend {
    server backend:8000;
}

server {
    listen 80;

    client_max_body_size 10M;

    # Django static files
    location /static/ {
        alias /app/src/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # MinIO object storage (public read — article photos)
    location /storage/ {
        proxy_pass http://minio:9000/;
        # Use the internal MinIO host so that MinIO doesn't embed the public
        # host/port in any redirect responses (e.g. console redirect on port 9001).
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite any redirect Location headers from MinIO so the client
        # is never sent to an internal host or the MinIO console port.
        proxy_redirect http://minio:9000/ /storage/;
        proxy_redirect http://minio:9001/ /storage/;

        # Disable buffering for large file downloads/uploads
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 50M;
    }

    # Django API and admin
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
