upstream backend {
    server backend:8000;
}

server {
    listen 80;

    client_max_body_size 10M;

    # Compress API JSON responses and common text assets.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/xml
        application/xml;

    # Django static files
    location /static/ {
        alias /app/src/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # MinIO object storage (public read — article photos)
    # Proxy /storage/<bucket>/<key> directly to minio:9000/<bucket>/<key>.
    # Never proxy bare /storage/ to MinIO's root (would redirect to the console
    # on port 9001). Requests with no bucket/key path are left to fall through
    # to Django (which returns a 404).
    location /storage/articles-photos/ {
        proxy_pass http://minio:9000/articles-photos/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for large file downloads/uploads
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 50M;
    }

    # Django API and admin
    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Forward the proto set by the outer (host) nginx rather than
        # overriding with $scheme, which is always 'http' inside Docker.
        # This lets Django correctly identify HTTPS connections and set
        # secure cookies via SECURE_PROXY_SSL_HEADER.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }
}
