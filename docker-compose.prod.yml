services:
  nginx:
    image: ghcr.io/gaut-b/rzo_coeur_api/nginx:${IMAGE_TAG:-latest}
    ports:
      # Expose only on localhost, nginx host will proxy to this port
      - '127.0.0.1:${NGINX_PORT:-8080}:80'
    volumes:
      # Config is baked into the image via nginx/Dockerfile — no bind mount needed
      - static_files:/app/src/staticfiles:ro
      - media_files:/app/src/media:ro
    depends_on:
      - backend
      - minio
    restart: unless-stopped

  backend:
    image: ghcr.io/gaut-b/rzo_coeur_api/backend:${IMAGE_TAG:-latest}
    env_file:
      - ./.env
    environment:
      - SQL_HOST=db
    volumes:
      - static_files:/app/src/staticfiles
      - media_files:/app/src/media
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgis/postgis:17-3.5
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=${SQL_DATABASE}
      - POSTGRES_USER=${SQL_USER}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SQL_USER} -d ${SQL_DATABASE}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001' # MinIO web console (proxied via host nginx at /minio/)
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      # Required for the console to work behind a reverse proxy at a sub-path
      - MINIO_BROWSER_REDIRECT_URL=${MINIO_BROWSER_REDIRECT_URL}
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    env_file:
      - ./.env
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/articles-photos;
        mc anonymous set download local/articles-photos;
        echo 'MinIO bucket ready.';
      "

volumes:
  db-data:
  static_files:
  media_files:
  minio-data:
