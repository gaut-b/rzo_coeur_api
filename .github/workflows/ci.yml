name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deployment'
        required: false
        default: 'Manual deployment'

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME resolves to 'gaut-b/rzo_coeur_api'
  IMAGE_NAME: ${{ github.repository }}
  # IMAGE_BASE is the full registry path used as prefix for all service images
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Collect static files
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'False'
        run: |
          uv run python manage.py collectstatic --noinput

      - name: Run tests
        env:
          SQL_ENGINE: django.contrib.gis.db.backends.postgis
          SQL_DATABASE: test_db
          SQL_USER: postgres
          SQL_PASSWORD: postgres
          SQL_HOST: localhost
          SQL_PORT: 5432
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: 'False'
        run: |
          uv run python manage.py test

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: rzo-coeur-e2e-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save backend image as tarball
        run: docker save rzo-coeur-e2e-backend:latest | gzip > backend-image.tar.gz

      - name: Upload backend image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: backend-image.tar.gz
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    needs: [test, lint, build]

    steps:
      - uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load backend image into Docker
        run: docker load < backend-image.tar.gz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen --group dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_NO_BUILD: '1'
        run: |
          uv run pytest e2e/ -p no:django \
            --output=test-results \
            --html=playwright-report/report.html \
            --self-contained-html \
            -v

      - name: Tear down e2e stack
        if: always()
        run: docker compose -f docker-compose.e2e.yml down -v || true

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen --group dev

      - name: Run ruff linter
        run: |
          uv run ruff check .

      - name: Run ruff formatter
        run: |
          uv run ruff format --check .

  push:
    runs-on: ubuntu-latest
    needs: [e2e]
    # Only run on manual trigger
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Tag and push backend image to GHCR
        run: |
          docker load < backend-image.tar.gz
          docker tag rzo-coeur-e2e-backend:latest ${{ env.IMAGE_BASE }}/backend:latest
          docker tag rzo-coeur-e2e-backend:latest ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}
          docker push ${{ env.IMAGE_BASE }}/backend:latest
          docker push ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/nginx:latest
            ${{ env.IMAGE_BASE }}/nginx:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push webhook image
        uses: docker/build-push-action@v5
        with:
          context: ./webhook
          file: ./webhook/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/webhook:latest
            ${{ env.IMAGE_BASE }}/webhook:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: push
    # Only deploy on manual trigger
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Trigger deploy via webhook
        run: |
          curl -X POST \
            https://${{ secrets.VPS_HOST }}:9000/hooks/deploy-rzo \
            -H "X-Deploy-Token: ${{ secrets.WEBHOOK_SECRET }}" \
            --fail \
            --max-time 300 \
            --proto '=https'
