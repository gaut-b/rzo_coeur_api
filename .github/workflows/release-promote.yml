# Description:
# Promotes a Release Candidate tag to a stable production tag.
#
# Steps:
#   1. Validates the provided RC tag format (v1.2.3-rc.N)
#   2. Checks out at the RC tag commit (no code changes, same exact commit)
#   3. Creates the stable tag (v1.2.3) pointing to that commit
#   4. Pushes the stable tag
#   5. Re-tags GHCR images from sha-<SHA> to vX.Y.Z + latest
#   6. Creates a GitHub Release with auto-generated release notes
#
# Trigger:
#   Runs automatically when an RC tag (v*-rc.*) is pushed, but pauses
#   at the "production" environment gate until a reviewer approves it.
#   Configure required reviewers at:
#   Settings > Environments > production > Required reviewers
#

name: Release Promote

on:
  push:
    tags:
      - 'v*-rc.*'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  release-promote:
    name: Promote RC tag to stable
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout at RC tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Extract stable version
        id: version
        run: |
          RC_TAG="${{ github.ref_name }}"
          STABLE_TAG=$(echo "$RC_TAG" | sed 's/-rc\.[0-9]*$//')
          echo "stable_tag=${STABLE_TAG}" >> $GITHUB_OUTPUT

      - name: Ensure stable tag does not already exist
        run: |
          STABLE_TAG="${{ steps.version.outputs.stable_tag }}"
          git fetch --tags
          if git rev-parse "$STABLE_TAG" >/dev/null 2>&1; then
            echo "❌ Stable tag $STABLE_TAG already exists"
            exit 1
          fi

      - name: Create and push stable tag
        run: |
          git tag -a ${{ steps.version.outputs.stable_tag }} -m "${{ steps.version.outputs.stable_tag }}"
          git push origin ${{ steps.version.outputs.stable_tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Re-tag and push backend image
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          docker pull ${{ env.IMAGE_BASE }}/backend:${SHA_TAG}
          docker tag ${{ env.IMAGE_BASE }}/backend:${SHA_TAG} ${{ env.IMAGE_BASE }}/backend:${{ steps.version.outputs.stable_tag }}
          docker tag ${{ env.IMAGE_BASE }}/backend:${SHA_TAG} ${{ env.IMAGE_BASE }}/backend:latest
          docker push ${{ env.IMAGE_BASE }}/backend:${{ steps.version.outputs.stable_tag }}
          docker push ${{ env.IMAGE_BASE }}/backend:latest

      - name: Re-tag and push nginx image
        run: |
          SHA_TAG="sha-${{ github.sha }}"
          docker pull ${{ env.IMAGE_BASE }}/nginx:${SHA_TAG}
          docker tag ${{ env.IMAGE_BASE }}/nginx:${SHA_TAG} ${{ env.IMAGE_BASE }}/nginx:${{ steps.version.outputs.stable_tag }}
          docker tag ${{ env.IMAGE_BASE }}/nginx:${SHA_TAG} ${{ env.IMAGE_BASE }}/nginx:latest
          docker push ${{ env.IMAGE_BASE }}/nginx:${{ steps.version.outputs.stable_tag }}
          docker push ${{ env.IMAGE_BASE }}/nginx:latest

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          STABLE_TAG="${{ steps.version.outputs.stable_tag }}"

          # Without --notes-start-tag, GitHub compares from the nearest git
          # tag (the RC), which points to the same commit → zero PRs in range
          # → empty notes. We force it to start from the previous stable tag.
          PREV_STABLE=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-rc\.' | grep -v "^${STABLE_TAG}$" | sort -V | tail -1)

          if [ -n "$PREV_STABLE" ]; then
            gh release create "${STABLE_TAG}" \
              --title "Release ${STABLE_TAG}" \
              --generate-notes \
              --notes-start-tag "${PREV_STABLE}" \
              --verify-tag
          else
            gh release create "${STABLE_TAG}" \
              --title "Release ${STABLE_TAG}" \
              --generate-notes \
              --verify-tag
          fi

      - name: Summary
        run: |
          echo "### ✅ Stable tag created: \`${{ steps.version.outputs.stable_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to GHCR:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/backend:${{ steps.version.outputs.stable_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/nginx:${{ steps.version.outputs.stable_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/nginx:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy to production: \`./scripts/deploy.sh prod\`" >> $GITHUB_STEP_SUMMARY
