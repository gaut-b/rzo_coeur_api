# Description:
# Creates a Release Candidate (RC) tag on main.
#
# Steps:
#   1. Runs semantic-release --dry-run to determine the next version
#        from conventional commits (feat → minor, fix/other → patch)
#   2. Creates and pushes the vX.Y.Z-rc.N tag
#   3. Builds Docker images and pushes to GHCR with tags:
#        sha-<SHA>, vX.Y.Z-rc.N, staging
#

name: Release RC

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  release-rc:
    name: Create RC tag on main
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write
      packages: write

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Compute next version and RC tag
        id: release
        run: |
          git fetch --tags

          # Current version from latest stable tag (v0.0.0 if none)
          LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*.[0-9]*" \
            | grep -v '\-rc\.' | sort -V | tail -1)
          CURRENT="${LATEST_TAG#v}"
          CURRENT="${CURRENT:-0.0.0}"

          # Bump type from conventional commits (angular preset):
          # feat → minor, fix/other → patch, BREAKING CHANGE/! → major
          BUMP=$(npx --yes \
            --package conventional-recommended-bump \
            --package conventional-changelog-angular \
            conventional-recommended-bump -p angular)
          echo "Bump type: $BUMP (current: $CURRENT)"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            *)     NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          # RC number for that version
          LATEST_RC=$(git tag -l "v${NEW_VERSION}-rc.*" | sort -V | tail -1)
          if [ -z "$LATEST_RC" ]; then
            RC_NUMBER=1
          else
            RC_NUMBER=$(echo "$LATEST_RC" | grep -oP '\d+$')
            RC_NUMBER=$((RC_NUMBER + 1))
          fi

          echo "rc_tag=v${NEW_VERSION}-rc.${RC_NUMBER}" >> $GITHUB_OUTPUT

      - name: Create and push RC tag
        run: |
          git tag -a ${{ steps.release.outputs.rc_tag }} -m "${{ steps.release.outputs.rc_tag }}"
          git push origin ${{ steps.release.outputs.rc_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:sha-${{ github.sha }}
            ${{ env.IMAGE_BASE }}/backend:${{ steps.release.outputs.rc_tag }}
            ${{ env.IMAGE_BASE }}/backend:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/nginx:sha-${{ github.sha }}
            ${{ env.IMAGE_BASE }}/nginx:${{ steps.release.outputs.rc_tag }}
            ${{ env.IMAGE_BASE }}/nginx:staging
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### ✅ RC tag created: \`${{ steps.release.outputs.rc_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Images pushed to GHCR:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/backend:${{ steps.release.outputs.rc_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/backend:staging\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/nginx:${{ steps.release.outputs.rc_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.IMAGE_BASE }}/nginx:staging\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deploy to staging: \`./scripts/deploy.sh staging\`" >> $GITHUB_STEP_SUMMARY
