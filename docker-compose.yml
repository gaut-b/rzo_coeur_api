services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - 80:80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - minio

  backend:
    build:
      context: .
    ports:
      - 8000:8000
    volumes:
      - ./:/api
    env_file:
      - ./.env
      - path: ./.env.local
        required: false   # local overrides (ngrok URL, etc.) — gitignored
    environment:
      - SQL_HOST=db
      # Override macOS-specific Homebrew paths from .env — let the container
      # auto-discover the system GDAL/GEOS libraries instead.
      - GDAL_LIBRARY_PATH=
      - GEOS_LIBRARY_PATH=
    # Use the CMD from the Dockerfile (gunicorn) or specify explicitly below:
    # command: gunicorn your_project.wsgi:application --bind 0.0.0.0:8000

    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
  db:
    image: postgis/postgis:17-3.5
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - 5432:5432
    env_file:
      - ./.env
    environment:
      - POSTGRES_DB=${SQL_DATABASE}
      - POSTGRES_USER=${SQL_USER}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${SQL_USER} -d ${SQL_DATABASE}']
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - 1025:1025 # SMTP server
      - 8025:8025 # Web UI

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - 9000:9000 # S3-compatible API
      - 9001:9001 # MinIO web console
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/articles-photos;
        mc anonymous set download local/articles-photos;
        echo 'MinIO bucket ready.';
      "

volumes:
  db-data:
  minio-data:
